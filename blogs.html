<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogs</title>
    <link rel="stylesheet" href="css/blogs.css">
</head>
<body>

    <!-- Search -->
    <div class="search-wrapper">
        <div class="search-bar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input id="searchInput" type="text" placeholder="Search posts..." autocomplete="off" />
        </div>
    </div>

    <!-- Post list -->
    <div class="blog-list" id="blogList"></div>

    <!-- Pagination -->
    <div class="pagination-bar" id="paginationBar">
        <button class="page-btn" id="prevBtn">&#8592; Previous</button>
        <span class="page-info" id="pageInfo"></span>
        <button class="page-btn" id="nextBtn">Next &#8594;</button>
    </div>

    <script src="scripts/blogdata.js"></script>
    <script>
        var ITEMS_PER_PAGE = 5;
        var currentPage   = 1;
        var activeData    = blogData;

        var listEl   = document.getElementById('blogList');
        var prevBtn  = document.getElementById('prevBtn');
        var nextBtn  = document.getElementById('nextBtn');
        var pageInfo = document.getElementById('pageInfo');

        function totalPages() {
            return Math.max(1, Math.ceil(activeData.length / ITEMS_PER_PAGE));
        }

        function render() {
            var tp    = totalPages();
            var start = (currentPage - 1) * ITEMS_PER_PAGE;
            var slice = activeData.slice(start, start + ITEMS_PER_PAGE);

            listEl.innerHTML = '';

            if (slice.length === 0) {
                listEl.innerHTML = '<p class="empty-state">No posts found.</p>';
            } else {
                slice.forEach(function(post) {
                    var item = document.createElement('div');
                    item.className = 'blog-item';
                    item.setAttribute('onclick', "window.location='" + post.link + "'");
                    item.innerHTML =
                        '<a class="blog-item-title" href="' + post.link + '">' + escHtml(post.title) + '</a>' +
                        '<div class="blog-item-meta">' + escHtml(post.date) + '</div>' +
                        '<p class="blog-item-summary">' + escHtml(post.content) + '</p>' +
                        '<span class="blog-item-link">Read more &#8594;</span>';
                    listEl.appendChild(item);
                });
            }

            pageInfo.textContent = 'Page ' + currentPage + ' of ' + tp;
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === tp;
        }

        function escHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        prevBtn.addEventListener('click', function() {
            if (currentPage > 1) { currentPage--; render(); }
        });

        nextBtn.addEventListener('click', function() {
            if (currentPage < totalPages()) { currentPage++; render(); }
        });

        document.getElementById('searchInput').addEventListener('input', function() {
            var q = this.value.toLowerCase().trim();
            activeData = q
                ? blogData.filter(function(p) {
                    return p.title.toLowerCase().includes(q) || p.content.toLowerCase().includes(q);
                  })
                : blogData;
            currentPage = 1;
            render();
        });

        render();
    </script>
</body>
</html>
