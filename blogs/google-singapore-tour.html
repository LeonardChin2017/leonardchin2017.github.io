<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Singapore Office Tour</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --text:    #111;
            --muted:   #666;
            --border:  #e5e5e5;
            --code-bg: #f6f6f6;
        }

        html { scroll-behavior: smooth; }

        body {
            background: #fff;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            font-size: 17px;
            line-height: 1.75;
            padding: 0 20px 80px;
        }

        #progress-bar {
            position: fixed;
            top: 0; left: 0;
            height: 2px;
            width: 0%;
            background: var(--text);
            z-index: 100;
            transition: width 0.1s linear;
        }

        .post {
            max-width: 720px;
            margin: 0 auto;
            padding-top: 48px;
        }

        .post-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 48px;
        }

        .back-link {
            font-size: 14px;
            color: var(--muted);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .back-link:hover { color: var(--text); }

        .read-time { font-size: 13px; color: var(--muted); }

        .post-header { margin-bottom: 40px; }

        .post-header h1 {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.25;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }

        .post-date { font-size: 14px; color: var(--muted); }

        .post-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 32px 0;
        }

        /* ── Body content ── */
        #post-body h1 { font-size: 1.75rem; font-weight: 700; margin: 2em 0 0.5em; letter-spacing: -0.02em; }
        #post-body h2 { font-size: 1.35rem; font-weight: 600; margin: 2em 0 0.5em; letter-spacing: -0.01em; }
        #post-body h3 { font-size: 1.1rem;  font-weight: 600; margin: 1.75em 0 0.4em; }
        #post-body h4 { font-size: 1rem;    font-weight: 600; margin: 1.5em 0 0.4em; }

        #post-body p { margin-bottom: 1.25em; }

        #post-body a { color: var(--text); text-decoration: underline; text-underline-offset: 3px; }
        #post-body a:hover { opacity: 0.6; }

        #post-body ul, #post-body ol { padding-left: 1.5em; margin-bottom: 1.25em; }
        #post-body li { margin-bottom: 0.35em; }
        #post-body li > ul, #post-body li > ol { margin-top: 0.35em; margin-bottom: 0; }

        #post-body hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }

        #post-body blockquote {
            border-left: 3px solid var(--border);
            padding-left: 1em;
            color: var(--muted);
            margin: 1.5em 0;
            font-style: italic;
        }

        #post-body img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 1.5em auto;
            border-radius: 4px;
        }

        /* Tables */
        #post-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5em 0;
            font-size: 14px;
            display: block;
            overflow-x: auto;
        }
        #post-body th, #post-body td {
            padding: 8px 14px;
            border: 1px solid var(--border);
            text-align: left;
            vertical-align: top;
        }
        #post-body th {
            background: var(--code-bg);
            font-weight: 600;
            font-size: 13px;
        }
        #post-body tr:nth-child(even) td { background: #fafafa; }

        /* Code */
        #post-body code {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.85em;
            background: var(--code-bg);
            padding: 2px 5px;
            border-radius: 3px;
        }
        #post-body pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            overflow-x: auto;
            margin: 1.5em 0;
            line-height: 1.55;
        }
        #post-body pre code {
            background: none;
            padding: 0;
            font-size: 14px;
            border-radius: 0;
        }
        /* Override highlight.js background so our border shows */
        #post-body pre code.hljs { background: transparent; padding: 0; }

        @media (max-width: 600px) {
            body { font-size: 16px; padding: 0 16px 60px; }
            .post { padding-top: 32px; }
            .post-header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div id="progress-bar"></div>
    <div class="post">
        <nav class="post-nav">
            <a class="back-link" href="javascript:history.back()">
                &#8592; Back
            </a>
            <span class="read-time">1 min read</span>
        </nav>

        <header class="post-header">
            <h1>Google Singapore Office Tour</h1>
            <p class="post-date">Published on Jan 11, 2019</p>
        </header>

        <hr class="post-divider">

        <article id="post-body">
<p>A one-day visit to the Google Singapore office. Here are some photos from the tour.</p>
<p><img src="../resource/images/Google/google_8.jpg" alt="Google Office"><br><img src="../resource/images/Google/google_9.jpg" alt="Google Office"><br><img src="../resource/images/Google/google_7.jpg" alt="Google Office"><br><img src="../resource/images/Google/google_6.jpg" alt="Google Office"><br><img src="../resource/images/Google/google_2.jpg" alt="Google Office"><br><img src="../resource/images/Google/google_3.jpg" alt="Google Office"><br><img src="../resource/images/Google/google_4.jpg" alt="Google Office"><br><img src="../resource/images/Google/google_5.jpg" alt="Google Office"><br><img src="../resource/images/Google/google_1.jpg" alt="Google Office"></p>
        </article>
    </div>

    <script>
        window.addEventListener('scroll', function() {
            var doc = document.documentElement;
            var scrolled = doc.scrollTop / (doc.scrollHeight - doc.clientHeight);
            document.getElementById('progress-bar').style.width = Math.min(scrolled * 100, 100) + '%';
        });
    </script>
</body>
</html>
