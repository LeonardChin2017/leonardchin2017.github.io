<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --text: #111;
            --muted: #666;
            --border: #e5e5e5;
            --code-bg: #f6f6f6;
            --max-width: 720px;
        }

        html { scroll-behavior: smooth; }

        body {
            background: #fff;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            font-size: 17px;
            line-height: 1.75;
            padding: 0 20px 80px;
        }

        /* Reading progress bar */
        #progress-bar {
            position: fixed;
            top: 0; left: 0;
            height: 2px;
            width: 0%;
            background: var(--text);
            z-index: 100;
            transition: width 0.1s linear;
        }

        .post {
            max-width: var(--max-width);
            margin: 0 auto;
            padding-top: 48px;
        }

        /* Top nav */
        .post-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 48px;
        }

        .back-link {
            font-size: 14px;
            color: var(--muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.15s;
        }
        .back-link:hover { color: var(--text); }
        .back-link svg { flex-shrink: 0; }

        .read-time {
            font-size: 13px;
            color: var(--muted);
        }

        /* Header */
        .post-header {
            margin-bottom: 40px;
        }

        .post-header h1 {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.25;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }

        .post-date {
            font-size: 14px;
            color: var(--muted);
        }

        .post-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 32px 0;
        }

        /* Markdown content */
        #post-body h1 { font-size: 1.75rem; font-weight: 700; margin: 2em 0 0.5em; letter-spacing: -0.02em; }
        #post-body h2 { font-size: 1.35rem; font-weight: 600; margin: 2em 0 0.5em; letter-spacing: -0.01em; }
        #post-body h3 { font-size: 1.1rem; font-weight: 600; margin: 1.75em 0 0.4em; }
        #post-body h4 { font-size: 1rem; font-weight: 600; margin: 1.5em 0 0.4em; }

        #post-body p { margin-bottom: 1.25em; }
        #post-body p:last-child { margin-bottom: 0; }

        #post-body a { color: var(--text); text-decoration: underline; text-underline-offset: 3px; }
        #post-body a:hover { opacity: 0.65; }

        #post-body ul, #post-body ol { padding-left: 1.5em; margin-bottom: 1.25em; }
        #post-body li { margin-bottom: 0.35em; }
        #post-body li > ul, #post-body li > ol { margin-top: 0.35em; margin-bottom: 0; }

        #post-body hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }

        #post-body blockquote {
            border-left: 3px solid var(--border);
            padding-left: 1em;
            color: var(--muted);
            margin: 1.5em 0;
            font-style: italic;
        }

        #post-body img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 1.5em auto;
            border-radius: 4px;
        }

        /* Tables */
        #post-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5em 0;
            font-size: 14px;
            overflow-x: auto;
            display: block;
        }
        #post-body th, #post-body td {
            padding: 8px 14px;
            border: 1px solid var(--border);
            text-align: left;
            vertical-align: top;
        }
        #post-body th {
            background: var(--code-bg);
            font-weight: 600;
            font-size: 13px;
        }
        #post-body tr:nth-child(even) td { background: #fafafa; }

        /* Code */
        #post-body code {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.85em;
            background: var(--code-bg);
            padding: 2px 5px;
            border-radius: 3px;
        }
        #post-body pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            overflow-x: auto;
            margin: 1.5em 0;
            line-height: 1.55;
        }
        #post-body pre code {
            background: none;
            padding: 0;
            font-size: 14px;
            border-radius: 0;
        }

        /* Loading / error states */
        .state-msg {
            text-align: center;
            color: var(--muted);
            padding: 60px 0;
            font-size: 15px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            body { font-size: 16px; padding: 0 16px 60px; }
            .post { padding-top: 32px; }
            .post-header h1 { font-size: 1.6rem; }
            #post-body h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div id="progress-bar"></div>

    <div class="post">
        <nav class="post-nav">
            <a class="back-link" href="javascript:history.back()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                Back
            </a>
            <span class="read-time" id="read-time"></span>
        </nav>

        <div id="post-header" class="post-header" style="display:none">
            <h1 id="post-title"></h1>
            <p class="post-date" id="post-date"></p>
        </div>

        <hr class="post-divider" id="post-divider" style="display:none">

        <div id="post-body">
            <p class="state-msg" id="state-msg">Loading...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        // Reading progress bar
        window.addEventListener('scroll', () => {
            const doc = document.documentElement;
            const scrollTop = doc.scrollTop || document.body.scrollTop;
            const scrollHeight = doc.scrollHeight - doc.clientHeight;
            const progress = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
            document.getElementById('progress-bar').style.width = progress + '%';
        });

        // Configure marked
        marked.setOptions({
            highlight: (code, lang) => {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        function estimateReadTime(text) {
            const words = text.trim().split(/\s+/).length;
            const minutes = Math.max(1, Math.round(words / 200));
            return minutes + ' min read';
        }

        function getSlug() {
            const params = new URLSearchParams(window.location.search);
            return params.get('post');
        }

        function setTitle(title) {
            document.title = title;
        }

        async function loadPost() {
            const slug = getSlug();
            const stateEl = document.getElementById('state-msg');

            if (!slug) {
                stateEl.textContent = 'No post specified.';
                return;
            }

            try {
                const res = await fetch('posts/' + slug + '.md');
                if (!res.ok) throw new Error('Not found');
                const raw = await res.text();

                // Parse front matter: lines at top between --- markers
                let content = raw;
                let title = '';
                let date = '';

                const fmMatch = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
                if (fmMatch) {
                    const fm = fmMatch[1];
                    content = fmMatch[2];
                    const titleMatch = fm.match(/^title:\s*(.+)$/m);
                    const dateMatch = fm.match(/^date:\s*(.+)$/m);
                    if (titleMatch) title = titleMatch[1].trim().replace(/^["']|["']$/g, '');
                    if (dateMatch) date = dateMatch[1].trim();
                }

                // Render markdown
                const html = marked.parse(content);

                // Show header
                if (title) {
                    document.getElementById('post-title').textContent = title;
                    document.getElementById('post-date').textContent = date ? 'Published on ' + date : '';
                    document.getElementById('post-header').style.display = 'block';
                    document.getElementById('post-divider').style.display = 'block';
                    setTitle(title);
                }

                // Reading time
                document.getElementById('read-time').textContent = estimateReadTime(content);

                // Inject content
                document.getElementById('post-body').innerHTML = html;

                // Re-run highlight on any un-highlighted code blocks
                document.querySelectorAll('#post-body pre code').forEach(el => {
                    if (!el.classList.contains('hljs')) hljs.highlightElement(el);
                });

            } catch (e) {
                stateEl.textContent = 'Could not load post.';
            }
        }

        loadPost();
    </script>
</body>
</html>
